<!-- ============================================
     DISEÑO VERDE - BASE: FUENTES Y VARIABLES
     Pegar en el PRIMER módulo HTML de Elementor
     ============================================ -->

<style>
/* === IMPORTACIÓN DE FUENTES E ICONOS === */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap');
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css');

/* === VARIABLES GLOBALES === */
:root {
  --dv-color-dark:       #1a2e1a;
  --dv-color-mid:        #2d4a2d;
  --dv-color-accent:     #c7d580;
  --dv-color-light:      #f5f0e8;
  --dv-color-white:      #ffffff;
  --dv-color-text-dark:  #1a2e1a;
  --dv-color-text-muted: #6b7c6b;
}

/* === ESTILOS BASE GLOBALES === */
.dv-wrapper,
.dv-wrapper * {
  box-sizing: border-box;
}

.dv-wrapper {
  font-family: 'Inter', sans-serif !important;
  font-size: 16px !important;
  font-weight: 300 !important;
  line-height: 1.75 !important;
  color: var(--dv-color-text-dark) !important;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.dv-wrapper h1 {
  font-family: 'Cormorant Garamond', serif !important;
  font-weight: 300 !important;
  line-height: 1.05 !important;
  margin: 0;
}

.dv-wrapper h2 {
  font-family: 'Cormorant Garamond', serif !important;
  font-weight: 400 !important;
  font-size: 48px !important;
  margin: 0;
}

.dv-wrapper h3 {
  font-family: 'Inter', sans-serif !important;
  font-weight: 500 !important;
  font-size: 18px !important;
  margin: 0;
}

.dv-wrapper p {
  margin: 0;
}

.dv-wrapper a {
  text-decoration: none;
  color: inherit;
}

.dv-wrapper img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* === FORZAR FUENTES DE ICONOS === */
.material-symbols-outlined {
  font-family: 'Material Symbols Outlined' !important;
  font-weight: normal;
  font-style: normal;
  font-size: 24px;
  line-height: 1;
  letter-spacing: normal;
  text-transform: none;
  display: inline-block;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  -webkit-font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
}

[class^="ti-"], [class*=" ti-"] {
  font-family: 'tabler-icons' !important;
}

/* === ANIMACIONES DE REVEAL GLOBALES === */
.dv-reveal-up {
  opacity: 0;
  transform: translateY(32px);
  will-change: transform, opacity;
}

.dv-reveal-left {
  opacity: 0;
  transform: translateX(-32px);
  will-change: transform, opacity;
}

.dv-reveal-right {
  opacity: 0;
  transform: translateX(32px);
  will-change: transform, opacity;
}

.dv-reveal-scale {
  opacity: 0;
  transform: scale(0.96);
  will-change: transform, opacity;
}

.dv-revealed {
  opacity: 1 !important;
  transform: none !important;
  transition: opacity 0.6s ease, transform 0.6s ease !important;
  transition-delay: var(--delay, 0ms) !important;
}

/* === SECTION DIVIDERS === */
.dv-section-divider {
  width: 100% !important;
  height: 60px !important;
  position: relative !important;
  z-index: 10 !important;
  pointer-events: none !important;
  margin-top: -59px !important;
  margin-bottom: -1px !important;
  background: transparent !important;
}

.dv-section-divider.dv-inverted {
  transform: scaleX(-1) !important;
}

.dv-section-divider svg {
  display: block !important;
  width: 100% !important;
  height: 100% !important;
}
</style>

<!-- Script global de Intersection Observer para reveals -->
<script>
(function() {
  if (window.dvRevealObserverLoaded) return;
  window.dvRevealObserverLoaded = true;

  function initDvReveals() {
    var revealOptions = {
      root: null,
      rootMargin: '0px 0px -50px 0px',
      threshold: 0.1
    };

    var revealObserver = new IntersectionObserver(function(entries, observer) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('dv-revealed');
          observer.unobserve(entry.target);
        }
      });
    }, revealOptions);

    var revealElements = document.querySelectorAll('.dv-reveal-up, .dv-reveal-left, .dv-reveal-right, .dv-reveal-scale');
    revealElements.forEach(function(el) {
      revealObserver.observe(el);
    });
  }

  // Ejecutar cuando el DOM esté listo
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initDvReveals);
  } else {
    initDvReveals();
  }

  // Re-observar cuando se carguen nuevos módulos (para Elementor editor)
  window.dvInitReveals = initDvReveals;
})();
</script>
