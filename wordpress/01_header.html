<!-- ============================================
     DISEÑO VERDE - HEADER / NAVBAR
     Pegar en módulo HTML de Elementor
     ============================================ -->

<style>
/* === HEADER STYLES === */
.dv-header {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  z-index: 9999 !important;
  background-color: transparent !important;
  border-bottom: 1px solid rgba(255, 255, 255, 0.15) !important;
  backdrop-filter: blur(12px) !important;
  -webkit-backdrop-filter: blur(12px) !important;
  transition: background-color 300ms ease, border-color 300ms ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease !important;
}

.dv-header.dv-scrolled {
  background-color: var(--dv-color-dark, #1a2e1a) !important;
  border-color: rgba(255, 255, 255, 0.05) !important;
}

.dv-header-inner {
  display: flex !important;
  justify-content: space-between !important;
  align-items: center !important;
  padding: 16px 20px !important;
  max-width: 80rem !important;
  margin: 0 auto !important;
}

@media (min-width: 768px) {
  .dv-header-inner {
    padding: 16px 80px !important;
  }
}

.dv-header-logo {
  max-width: 140px !important;
  height: auto !important;
  display: block !important;
}

.dv-nav-desktop {
  display: none !important;
  gap: 2rem !important;
  align-items: center !important;
}

@media (min-width: 768px) {
  .dv-nav-desktop {
    display: flex !important;
  }
}

.dv-nav-link {
  color: var(--dv-color-white, #fff) !important;
  font-family: 'Inter', sans-serif !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  letter-spacing: 0.1em !important;
  text-transform: uppercase !important;
  position: relative !important;
  padding-bottom: 4px !important;
  border: none !important;
  opacity: 0.85;
  transition: opacity 0.3s ease;
  text-decoration: none !important;
}

.dv-nav-link:hover,
.dv-nav-link.dv-active {
  opacity: 1 !important;
}

.dv-nav-link::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background-color: var(--dv-color-accent, #c8a96e);
  transition: width 0.3s ease;
}

.dv-nav-link:hover::after,
.dv-nav-link.dv-active::after {
  width: 100%;
}

.dv-cta-btn {
  background-color: var(--dv-color-accent, #c8a96e) !important;
  color: var(--dv-color-dark, #1a2e1a) !important;
  border: none !important;
  border-radius: 999px !important;
  padding: 10px 24px !important;
  font-family: 'Inter', sans-serif !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  text-decoration: none !important;
  cursor: pointer !important;
}

.dv-cta-btn:hover {
  transform: scale(1.03) !important;
  background-color: var(--dv-color-white, #fff) !important;
  color: var(--dv-color-dark, #1a2e1a) !important;
}

.dv-cta-desktop {
  display: none !important;
}

@media (min-width: 768px) {
  .dv-cta-desktop {
    display: block !important;
  }
}

.dv-menu-btn {
  display: block !important;
  color: var(--dv-color-white, #fff) !important;
  background: none !important;
  border: none !important;
  padding: 8px !important;
  cursor: pointer !important;
}

@media (min-width: 768px) {
  .dv-menu-btn {
    display: none !important;
  }
}

/* Mobile Menu */
.dv-mobile-menu {
  display: none;
  position: absolute !important;
  top: 100% !important;
  left: 0 !important;
  width: 100% !important;
  background-color: rgba(26, 46, 26, 0.95) !important;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
  backdrop-filter: blur(12px) !important;
  -webkit-backdrop-filter: blur(12px) !important;
  padding: 24px 20px !important;
  flex-direction: column !important;
  gap: 16px !important;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1) !important;
}

.dv-mobile-menu.dv-open {
  display: flex !important;
}

.dv-mobile-menu a {
  color: var(--dv-color-white, #fff) !important;
  font-family: 'Inter', sans-serif !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  padding: 8px 12px !important;
  transition: color 0.3s ease !important;
  text-decoration: none !important;
}

.dv-mobile-menu a:hover {
  color: var(--dv-color-accent, #c8a96e) !important;
}

.dv-mobile-menu .dv-cta-btn {
  width: 13rem !important;
  margin: 8px auto 0 auto !important;
}
</style>

<div class="dv-wrapper">
  <header id="dv-header" class="dv-header">
    <div class="dv-header-inner">
      <div style="display: flex; align-items: center; gap: 16px;">
        <!-- ACTUALIZAR: Cambiar src por la URL de tu logo en WordPress -->
        <img alt="Diseño Verde Logo" class="dv-header-logo" src="./images/logo-footer.png">
      </div>
      <nav class="dv-nav-desktop">
        <a class="dv-nav-link dv-active" href="#inicio">Inicio</a>
        <a class="dv-nav-link" href="#servicios">Servicios</a>
        <a class="dv-nav-link" href="#galeria">Galería</a>
        <a class="dv-nav-link" href="#contacto">Contacto</a>
      </nav>
      <div class="dv-cta-desktop">
        <a class="dv-cta-btn" href="#contacto">Presupuesto</a>
      </div>
      <button id="dv-menu-btn" class="dv-menu-btn">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
      </button>
    </div>
    <!-- Mobile Menu -->
    <div id="dv-mobile-menu" class="dv-mobile-menu">
      <a href="#inicio">Inicio</a>
      <a href="#servicios">Servicios</a>
      <a href="#galeria">Galería</a>
      <a href="#contacto">Contacto</a>
      <a class="dv-cta-btn" href="#contacto">Presupuesto</a>
    </div>
  </header>
</div>

<script>
(function() {
  var header = document.getElementById('dv-header');
  var menuBtn = document.getElementById('dv-menu-btn');
  var mobileMenu = document.getElementById('dv-mobile-menu');

  // Scroll behavior
  function handleScroll() {
    if (header) {
      if (window.scrollY > 50) {
        header.classList.add('dv-scrolled');
      } else {
        header.classList.remove('dv-scrolled');
      }
    }
  }
  window.addEventListener('scroll', handleScroll);
  handleScroll();

  // Mobile menu toggle
  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener('click', function() {
      mobileMenu.classList.toggle('dv-open');
      var icon = menuBtn.querySelector('.material-symbols-outlined');
      if (icon) {
        icon.textContent = mobileMenu.classList.contains('dv-open') ? 'close' : 'menu';
      }
    });

    var mobileLinks = mobileMenu.querySelectorAll('a');
    mobileLinks.forEach(function(link) {
      link.addEventListener('click', function() {
        mobileMenu.classList.remove('dv-open');
        var icon = menuBtn.querySelector('.material-symbols-outlined');
        if (icon) icon.textContent = 'menu';
      });
    });
  }
})();
</script>
